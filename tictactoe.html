<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #toggle-mode {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2.5rem;
      font-size: 1rem;
      color: #ccc;
    }

    .score-block { text-align: center; }
    .score-block span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-block .x-score { color: #e94560; }
    .score-block .o-score { color: #a8dadc; }
    .score-block .d-score { color: #888; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <button id="restart">Restart</button>
  <button id="toggle-mode">vs CPU</button>
</div>

<div id="score">
  <div class="score-block">
    <span class="x-score" id="sx">0</span>
    Player X
  </div>
  <div class="score-block">
    <span class="d-score" id="sd">0</span>
    Draws
  </div>
  <div class="score-block">
    <span class="o-score" id="so">0</span>
    Player O
  </div>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, current, gameOver, vsCPU, scores;

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const sx = document.getElementById('sx');
  const so = document.getElementById('so');
  const sd = document.getElementById('sd');
  const toggleBtn = document.getElementById('toggle-mode');

  vsCPU = false;
  scores = { X: 0, O: 0, D: 0 };

  function init() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "Player X's turn";
  }

  function checkWin(b, p) {
    return WINS.find(line => line.every(i => b[i] === p)) || null;
  }

  function isDraw(b) { return b.every(Boolean); }

  function endGame(winner, line) {
    gameOver = true;
    if (winner) {
      scores[winner]++;
      updateScore();
      line.forEach(i => cells[i].classList.add('win'));
      status.textContent = vsCPU && winner === 'O'
        ? '🤖 CPU wins!'
        : `Player ${winner} wins! 🎉`;
    } else {
      scores.D++;
      updateScore();
      status.textContent = "It's a draw!";
    }
  }

  function updateScore() {
    sx.textContent = scores.X;
    so.textContent = scores.O;
    sd.textContent = scores.D;
  }

  function minimax(b, isMax) {
    const win = checkWin(b, 'O');
    if (win) return 10;
    if (checkWin(b, 'X')) return -10;
    if (isDraw(b)) return 0;
    let best = isMax ? -Infinity : Infinity;
    for (let i = 0; i < 9; i++) {
      if (!b[i]) {
        b[i] = isMax ? 'O' : 'X';
        const val = minimax(b, !isMax);
        b[i] = null;
        best = isMax ? Math.max(best, val) : Math.min(best, val);
      }
    }
    return best;
  }

  function cpuMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const val = minimax(board, false);
        board[i] = null;
        if (val > best) { best = val; move = i; }
      }
    }
    return move;
  }

  function play(i) {
    if (gameOver || board[i]) return;
    board[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');

    const line = checkWin(board, current);
    if (line) { endGame(current, line); return; }
    if (isDraw(board)) { endGame(null, null); return; }

    current = current === 'X' ? 'O' : 'X';

    if (vsCPU && current === 'O') {
      status.textContent = '🤖 CPU is thinking…';
      setTimeout(() => {
        const m = cpuMove();
        if (m !== -1) play(m);
      }, 300);
    } else {
      status.textContent = `Player ${current}'s turn`;
    }
  }

  cells.forEach(c => c.addEventListener('click', () => play(+c.dataset.i)));

  document.getElementById('restart').addEventListener('click', init);

  toggleBtn.addEventListener('click', () => {
    vsCPU = !vsCPU;
    toggleBtn.textContent = vsCPU ? 'vs Human' : 'vs CPU';
    init();
  });

  init();
</script>
</body>
</html>
